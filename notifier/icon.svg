    <!-- mute slash -->
    <line x1="-300" y1="-320" x2="300" y2="320" stroke="#ffffff" stroke-width="70" stroke-linecap="round"/>
    <line x1="-300" y1="-320" x2="300" y2="320" stroke="#d97757" stroke-width="34" stroke-linecap="round"/>
