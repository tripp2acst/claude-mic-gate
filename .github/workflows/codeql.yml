name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swiftc -O mic-in-use.swift -o mic-in-use

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
